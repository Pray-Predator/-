<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>问卷提交系统</title>
    <!-- 引入Supabase JS SDK v2（CDN方式，无需安装） -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .title {
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 32px;
        }

        .option-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
        }

        .option-item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-item:hover {
            border-color: #667eea;
            background-color: #f8f9ff;
        }

        .option-item.selected {
            border-color: #667eea;
            background-color: #f0f4ff;
        }

        .option-number {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .option-text {
            font-size: 18px;
            color: #374151;
            flex: 1;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #9ca3af;
        }

        /* 弹窗样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
        }

        .modal-text {
            color: #6b7280;
            margin-bottom: 24px;
        }

        .modal-btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">请选择你所在的中心</h1>
        
        <div class="option-list">
            <div class="option-item" data-value="丹东市中心">
                <div class="option-number">1</div>
                <div class="option-text">丹东市中心</div>
            </div>
            <div class="option-item" data-value="阜新矿总">
                <div class="option-number">2</div>
                <div class="option-text">阜新矿总</div>
            </div>
            <div class="option-item" data-value="抚顺市中心">
                <div class="option-number">3</div>
                <div class="option-text">抚顺市中心</div>
            </div>
            <div class="option-item" data-value="抚顺矿总">
                <div class="option-number">4</div>
                <div class="option-text">抚顺矿总</div>
            </div>
            <div class="option-item" data-value="阜新市中心">
                <div class="option-number">5</div>
                <div class="option-text">阜新市中心</div>
            </div>
            <div class="option-item" data-value="丹东第一">
                <div class="option-number">6</div>
                <div class="option-text">丹东第一</div>
            </div>
            <div class="option-item" data-value="省人民">
                <div class="option-number">7</div>
                <div class="option-text">省人民</div>
            </div>
        </div>

        <button class="submit-btn" id="submitBtn">提交</button>
        
        <div class="footer">
            注：该程序最终解释权归Pray or Predator所有
        </div>
    </div>

    <!-- 提示弹窗 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">提示</div>
            <div class="modal-text" id="modalText"></div>
            <button class="modal-btn" id="modalBtn">确定</button>
        </div>
    </div>

    <script>
        // ====================== 已帮你填好正确的配置 ======================
        const SUPABASE_URL = 'https://axfniyotkeucqkiptjhq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4Zm5peW90a2V1Y3FraXB0amhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NzM5MzYsImV4cCI6MjA5NjQ0OTkzNn0.DQnbDPjt7_j_MiGzd6bTPpJBzpKncmBw7RykktH0LQ4';
        // ================================================================

        // 初始化Supabase客户端
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // DOM元素
        const optionItems = document.querySelectorAll('.option-item');
        const submitBtn = document.getElementById('submitBtn');
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modalTitle');
        const modalText = document.getElementById('modalText');
        const modalBtn = document.getElementById('modalBtn');

        // 选中的选项
        let selectedValue = null;

        // 选项点击事件
        optionItems.forEach(item => {
            item.addEventListener('click', () => {
                // 移除所有选中状态
                optionItems.forEach(i => i.classList.remove('selected'));
                // 添加当前选中状态
                item.classList.add('selected');
                // 保存选中值
                selectedValue = item.dataset.value;
            });
        });

        // 提交按钮点击事件
        submitBtn.addEventListener('click', async () => {
            // 检查是否选择了选项
            if (!selectedValue) {
                showModal('提示', '请先选择一个中心');
                return;
            }

            // 禁用提交按钮，防止重复提交
            submitBtn.disabled = true;
            submitBtn.textContent = '提交中...';

            try {
                // 插入数据到Supabase数据库（完全匹配你的表结构）
                const { data, error } = await supabase
                    .from('student_answers')
                    .insert([
                        {
                            student_id: crypto.randomUUID(), // 自动生成唯一学生ID（满足UNIQUE约束）
                            answers: selectedValue // 存储用户选择的中心名称
                        }
                    ]);

                if (error) throw error;

                // 提交成功
                showModal('提交成功', '你的选择已成功提交！');
                // 重置选中状态
                optionItems.forEach(i => i.classList.remove('selected'));
                selectedValue = null;

            } catch (error) {
                console.error('提交失败详细信息:', error);
                // 提交失败
                showModal('提交失败', `错误信息：${error.message}`);
            } finally {
                // 恢复提交按钮状态
                submitBtn.disabled = false;
                submitBtn.textContent = '提交';
            }
        });

        // 显示弹窗
        function showModal(title, text) {
            modalTitle.textContent = title;
            modalText.textContent = text;
            modal.classList.add('show');
        }

        // 关闭弹窗
        modalBtn.addEventListener('click', () => {
            modal.classList.remove('show');
        });

        // 点击弹窗外部关闭
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('show');
            }
        });
    </script>
</body>
</html>
